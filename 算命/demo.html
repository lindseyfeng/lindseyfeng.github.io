<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Fortune Teller</title>

    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: #f2f4f8;
            padding-top: 80px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 1em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .top-bar a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin: 0 12px;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        .top-bar a:hover {
            color: #0077cc;
        }

        .page {
            max-width: 100em;
            margin: 0 auto;
            padding: 24px 24px 80px;
            box-sizing: border-box;
        }

        .page h1 {
            margin: 0;
            font-size: 2.2em;
            line-height: 1.15;
        }

        .muted {
            color: #667085;
            font-size: 0.92em;
            margin-top: 6px;
        }

        .demo-wrap {
            position: relative;
            margin-top: 3vh;
        }

        .demo-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.08);
            padding: 20px;
            box-sizing: border-box;
            overflow: visible;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            align-items: start;
        }

        .demo-textarea {
            width: 100%;
            /* Fill the column width */
            height: 300px;
            /* Fixed height */
            box-sizing: border-box;
            /* Includes padding in width/height */
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fafafa;
            font-size: 13px;
            line-height: 1.5;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;

            /* Scrolling ability */
            overflow-y: auto;
            white-space: pre-wrap;
            /* Preserve prompt formatting */
            display: block;
        }


        @media (max-width: 70em) {
            .demo-grid {
                grid-template-columns: 1fr;
            }
        }

        .demo-title {
            font-weight: 750;
            margin: 0 0 8px 0;
        }


        .draft-pre {
            margin: 0;
            white-space: pre-wrap;
            border: 2px dashed #aaa;
            padding: 10px;
            min-height: 120px;
            max-height: 230px;
            overflow: auto;
            background: #fdfdfd;
            border-radius: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            line-height: 1.45;
        }

        .btn {
            padding: 0.7em 1.2em;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 750;
            transition: opacity 0.2s;
        }

        .btn-primary {
            background: #4f46e5;
            color: #fff;
        }

        .btn-secondary {
            background: #eef2ff;
            color: #4f46e5;
            border: 1px solid #4f46e5;
        }

        .btn-danger {
            background: #ff6b6b;
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .rin-sticker {
            position: absolute;
            top: -100px;
            right: -20px;
            width: 165px;
            height: auto;
            z-index: 50;
            pointer-events: none;
            filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.25));
        }

        #result-box {
            display: none;
            width: 100%;
            background: white;
            margin-top: 18px;
            padding: 18px;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.08);
        }

        #result-content {
            max-height: 60vh;
            overflow-y: auto;
            border: 2px dashed #aaa;
            padding: 1em;
            background: #fdfdfd;
            border-radius: 10px;
            white-space: pre-wrap;
            font-size: 1.02em;
            line-height: 1.6;
        }

        .scroll-down-arrow {
            animation: bounce 1.5s infinite;
            color: #6b7280;
            display: none;
            justify-content: center;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(8px);
            }
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Hide the menu by default */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            /* Sits right below the link */
            left: 0;
            background-color: white;
            min-width: 7em;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            z-index: 1001;
            overflow: hidden;
        }

        /* Style links inside the dropdown */
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            margin: 0;
            /* Override the 12px margin from .top-bar a */
            font-size: 0.9em;
        }

        /* Hover effect for dropdown links */
        .dropdown-content a:hover {
            background-color: #f1f1f1;
            color: #0077cc;
        }

        /* Show the menu on hover */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Add a small arrow next to dropdown text */
        .dropdown>a::after {
            content: " ▾";
            font-size: 0.8em;
        }
    </style>
</head>

<body>
    <div class="top-bar" id="topBar">
        <div class="left-links">
            <a href="sample-page.html">中文</a>
            <a href="sample-page-eng.html">English</a>
        </div>
        <div class="right-links" style="margin-right: 1em;">
            <div class="dropdown">
                <a href="#">八卦/Bagua</a>
                <div class="dropdown-content">
                    <a href="sample-page-eng.html">basic stuff</a>
                    <a href="demo.html">how prompting helps</a>

                </div>
            </div>
            <a href="sample-page.html">塔罗牌/Tarot</a>


        </div>
    </div>


    <div class="page">
        <div id="root"></div>

        <div id="result-box">
            <div id="result-content">Final response will appear here...</div>
            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-danger" onclick="document.getElementById('result-box').style.display='none'">Hide
                    results</button>
                <button class="btn btn-primary" onclick="window.scrollTo({ top: 0, behavior: 'smooth' })">Back to
                    top</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>


    <script type="text/babel">
        function getGreetingAndDate() {
            const now = new Date();
            const hour = now.getHours();
            const greeting = hour < 12 ? "A new morning" : hour < 18 ? "A calm afternoon" : "A quiet evening";
            const options = { weekday: 'long', month: 'numeric', day: 'numeric' };
            return `${greeting} • ${now.toLocaleDateString('en-US', options)}`;
        }

        const API_URL = "https://hf-api-tau.vercel.app/api/fortune";
        const MODEL = "Qwen/Qwen3-8B:featherless-ai";

        async function callLLM(userContent) {
            const resp = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [{ role: "user", content: userContent }],
                    chat_template_kwargs: { enable_thinking: false }
                })
            });
            const data = await resp.json();
            return data.choices[0].message.content;
        }

        function App() {
            const [dob, setDob] = React.useState('');
            const [time, setTime] = React.useState('');
            const [city, setCity] = React.useState('');
            const [gender, setGender] = React.useState('Female');
            const [topic, setTopic] = React.useState('');

            const [drafts, setDrafts] = React.useState(["", "", ""]);
            const [picked, setPicked] = React.useState(0);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            const fullPrompt = `### System
You are a seasoned fortune consultant fluent in:
- Four Pillars (Bazi) methods and long-term pattern reading,
- I Ching (Zhouyi) interpretation.

Workflow requirements:
- First, infer the long-term framework from the Four Pillars (Bazi).
- Then RANDOMLY draw: (1) one primary hexagram AND (2) optionally 0–1 changing line(s).
- You MUST include one short direct quote from the I Ching (hexagram text OR line text) in the body (15–40 Chinese characters is okay even in an English reading), and then explain it in plain English.

Tone & safety:
1) Warm, respectful, not overly fatalistic, but must sound profound and knowledgeable.
2) Include the I Ching quote in the main body and provide a clear plain-English explanation of what it implies.
3) End with: "Disclaimer: For entertainment only and not a substitute for professional advice."

### User
[Personal Info]
- Date of birth: ${dob}
- Time of birth: ${time}
- Place of birth: ${city}
- Gender: ${gender}

[What I want guidance on]
${topic}

### Assistant - Expected format
**1) Core takeaway (≤ 30 words)**

**2) Bazi overview**
- Pillars (Heavenly Stems & Earthly Branches): ...
- Five elements balance: ...
- Favorable elements / unfavorable elements: ...
> *Quote requirement*: If you mention "useful element" judgments, include one short quote from a classic (can be in Chinese) and explain it in English.

**3) Reading for "${topic}"**
- Short-term (today/this week):
- Medium-term (next 1–3 months):
- Practical suggestions (3 bullets max):

**4) I Ching draw**
- Hexagram name/number: ...
- Quote (15–40 chars): "..."
- Plain-English meaning:
- If there is a changing line, specify which line and why it matters.

**5) Closing**
Disclaimer: For entertainment only and not a substitute for professional advice.
`;

            async function generateThreeDrafts() {
                if (!topic) { setError("Please state your inquiry."); return; }
                setError(null); setLoading(true);
                try {
                    const [a, b, c] = await Promise.all([
                        callLLM(fullPrompt + "\nDraft style: Novelty-first. Avoid generic fortune-telling phrases. Provide at least 2 non-obvious, concrete insights that are still plausible. Do not repeat common clichés."),
                        callLLM(fullPrompt + "\nDraft style: Consistency-first. Minimize internal contradictions. If information is uncertain, state uncertainty and pick the most coherent reading. Ensure the Bazi elements and I Ching interpretation do not conflict."),
                        callLLM(fullPrompt + "\nDraft style: Actionability-first. Produce 3 highly practical, low-regret suggestions tied to the reading. Avoid vague advice. Each suggestion must be specific, doable this week, and non-harmful.")
                    ]);
                    setDrafts([a, b, c]);
                } catch (e) { setError("Failed to reach stars."); }
                finally { setLoading(false); }
            }

            // FIX: This function now handles the button click, calls the AI, and updates the UI
            async function handleConfirm() {
                setLoading(true);
                setError(null);
                try {
                    const synthesisPrompt = `
### Task: Multi-Perspective Synthesis
You have been provided with 3 separate draft interpretations for the same user query.
[Draft 1]: ${drafts[0]}
[Draft 2]: ${drafts[1]}
[Draft 3]: ${drafts[2]}

### Objective:
Extract the most logically sound Bazi pillars and I Ching insights. Resolve contradictions. Produce a FINAL, high-density fortune that follows the same format as the other reading. 
                `;
                    const finalOutput = await callLLM(synthesisPrompt);

                    // Update the result box in the HTML
                    const resultBox = document.getElementById('result-box');
                    const resultContent = document.getElementById('result-content');

                    resultContent.innerText = finalOutput;
                    resultBox.style.display = 'block';

                    // Scroll down to the result
                    resultBox.scrollIntoView({ behavior: 'smooth' });
                } catch (e) {
                    setError("Synthesis failed.");
                } finally {
                    setLoading(false);
                }
            }

            const inputStyle = { width: '100%', padding: '10px', border: '1px solid #ccc', borderRadius: '8px', fontSize: '14px' };

            return (
                <div>
                    <h1>{getGreetingAndDate()}</h1>
                    <p className="muted">Live preview the logic → get your reading.</p>

                    <div className="demo-wrap">
                        <img className="rin-sticker" src="rin.gif" alt="Rin" />

                        <div className="demo-card">
                            <div className="demo-grid">
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '15px' }}>
                                    <div>
                                        <div className="demo-title">Live Prompt Preview</div>
                                        <pre className="demo-textarea">{fullPrompt}</pre>
                                    </div>

                                    <div style={{ padding: '20px', background: '#fcfcfc', border: '1px solid #eee', borderRadius: '12px' }}>
                                        <div style={{ display: 'flex', gap: '10px', marginBottom: '10px' }}>
                                            <input type="date" value={dob} onChange={e => setDob(e.target.value)} style={inputStyle} />
                                            <input type="time" value={time} onChange={e => setTime(e.target.value)} style={inputStyle} />
                                        </div>
                                        <div style={{ display: 'flex', gap: '10px', marginBottom: '10px' }}>
                                            <input type="text" placeholder="Birth City" value={city} onChange={e => setCity(e.target.value)} style={inputStyle} />
                                            <select value={gender} onChange={e => setGender(e.target.value)} style={inputStyle}>
                                                <option value="female">Female</option>
                                                <option value="male">Male</option>
                                            </select>
                                        </div>
                                        <textarea
                                            placeholder="What is your question?"
                                            value={topic}
                                            onChange={e => setTopic(e.target.value)}
                                            style={{ ...inputStyle, height: '80px', resize: 'none', marginBottom: '10px' }}
                                        />
                                        <button className="btn btn-primary" style={{ width: '100%' }} onClick={generateThreeDrafts} disabled={loading}>
                                            {loading ? "Drawing Stars..." : "Generate 3 Drafts"}
                                        </button>
                                    </div>
                                </div>

                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                    <div className="demo-title">Reading Styles</div>
                                    {["A (Novelty-first)", "B (Consistency-first)", "C (Actionability-first)"].map((label, idx) => (
                                        <div key={idx}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '5px', cursor: 'pointer' }}>
                                                <input type="radio" checked={picked === idx} onChange={() => setPicked(idx)} />
                                                <span style={{ fontWeight: 'bold' }}>{label}</span>
                                            </label>
                                            <pre className="draft-pre">{drafts[idx] || "Draft will appear here..."}</pre>
                                        </div>
                                    ))}
                                    <button
                                        className="btn btn-secondary"
                                        style={{ width: '100%', marginTop: '10px' }}
                                        onClick={handleConfirm}
                                        disabled={loading || !drafts[0]}
                                    >
                                        {loading ? "Synthesizing..." : "Confirm & Synthesize Reading"}
                                    </button>
                                </div>
                            </div>

                            {error && <div style={{ color: 'red', marginTop: '10px', textAlign: 'center' }}>{error}</div>}

                            <div style={{ marginTop: '2em', borderTop: '2px solid #e2e8f0', paddingTop: '1em' }}>
                                <h3 style={{ color: '#1e293b' }}>⚙️ Pipeline View: Hierarchical Synthesis</h3>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px', color: '#64748b', fontSize: '0.9em' }}>
                                    <div style={{ padding: '8px', background: '#dcfce7', borderRadius: '4px', border: '1px solid #22c55e' }}>3x Parallel Reasoning</div>
                                    <span>➔</span>
                                    <div style={{ padding: '8px', background: '#fef9c3', borderRadius: '4px', border: '1px solid #eab308' }}>Knowledge Aggregator</div>
                                    <span>➔</span>
                                    <div style={{ padding: '8px', background: '#dbeafe', borderRadius: '4px', border: '1px solid #3b82f6' }}>Final High-Density Output</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>



</body>

</html>
