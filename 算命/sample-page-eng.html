<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Fortune Teller</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: #f2f4f8;
            padding-top: 80px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 99%;
            background: white;
            padding: 1em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: none;
            z-index: 1000;
            transition: all 0.3s ease;
        }


        .top-bar a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin: 0 12px;
            transition: color 0.2s ease;
        }

        .top-bar a:hover {
            color: #0077cc;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 90vh
        }

        .main-row {
            display: flex;
            width: 100%;
            height: calc(100vh - 100px);
        }

        .gif-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 2em;
            box-sizing: border-box;
        }

        .gif-container img {
            max-width: 100%;
            height: 90vh;
            object-fit: contain;
        }

        .form-box {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 2em;
            box-sizing: border-box;
            margin-top: 2em;
            width: 100%;
            margin-left: auto;
        }

        #result-box {
            display: None;
            width: 100%;
            min-height: 80vh;
            background: white;
            margin-top: 3em;
            padding: 2em;
            box-sizing: border-box;
            border-top: 1px solid #eee;
            overflow-y: auto;
        }

        .result-content {
            font-size: 1.2em;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        #close-result {
            position: fixed;
            top: 1em;
            right: 1em;
            font-size: 1.5em;
            background: none;
            border: none;
            cursor: pointer;
        }

        .scroll-down-arrow {
            animation: bounce 1.5s infinite;
            color: #999;
            display: None;
            justify-content: center;
            text-align: center;
            font-size: 2.5em;
            margin-top: 0.5em;
            cursor: default;
        }


        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(10px);
            }
        }
    </style>
</head>

<body>
    <div class="top-bar" id="topBar">
        <div class="left-links">
            <a href="sample-page.html">中文</a>
            <a href="sample-page-eng.html">English</a>
        </div>
        <div class="right-links">
            <a href="sample-page.html">八卦/Bagua</a>
            <a href="#">塔罗牌/Tarot</a>
        </div>
    </div>


    <div class="content">
        <div class="main-row">
            <div class="gif-container">
                <img src="../img/asuka.gif" alt="Y2K GIF" />
            </div>

            <div class="form-box" id="root">
            </div>
        </div>
    </div>

    <div id="result-box">
        <div class="result-content" id="result-content" style="
            max-height: 60vh;
            overflow-y: auto;
            border: 2px dashed #aaa;
            padding: 1em;
            min-height: 10em;
            background: #fdfdfd;
            border-radius: 8px;
            white-space: pre-wrap;
        ">
            👀 Your fortune will appear here...
        </div>

        <div style="margin-top: 1em; display: flex; gap: 0.5em; justify-content: center;">
            <button onclick="document.getElementById('result-box').style.display='none'; document.querySelector('.scroll-down-arrow').style.display='none'" style="
                padding: 0.4em 0.8em;
                font-size: 1em;
                border: none;
                border-radius: 4px;
                background-color: #ff6b6b;
                color: white;
                cursor: pointer;

              ">
                Hide results
            </button>

            <button onclick="
                document.getElementById('result-content').innerText = '';
                document.getElementById('result-box').style.display='none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
              " style="
                padding: 0.4em 0.8em;
                font-size: 1em;
                border: none;
                border-radius: 4px;
                background-color: #4f46e5;
                color: white;
                cursor: pointer;
              ">
                Not satisfied? Try again
            </button>
        </div>

    </div>





    <script>

        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            });

            const target = document.getElementById('scrollAnimatedBox');
            if (target) {
                observer.observe(target);
            }
        });


        const topBar = document.getElementById('topBar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 10) {
                topBar.classList.add('scrolled');
            } else {
                topBar.classList.remove('scrolled');
            }
        });
    </script>

    <!-- React + Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        function getGreetingAndDate() {
            const now = new Date();
            const hour = now.getHours();

            let greeting;
            if (hour < 6) greeting = "Late-night whispers";
            else if (hour < 12) greeting = "A new morning";
            else if (hour < 18) greeting = "A calm afternoon";
            else greeting = "A quiet evening";

            const weekday = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"][now.getDay()];
            const month = now.getMonth() + 1;
            const day = now.getDate();

            return `${greeting} • ${weekday} ${month}/${day}`;
        }

        async function fetchFortuneViaHuggingFaceProxy({ dob, time, city, model, gender, topic }) {
            const fullPrompt = `
### System
You are a seasoned fortune consultant fluent in:
- Four Pillars (Bazi) methods and long-term pattern reading,
- I Ching (Zhouyi) interpretation.

Workflow requirements:
- First, infer the long-term framework from the Four Pillars (Bazi).
- Then RANDOMLY draw: (1) one primary hexagram AND (2) optionally 0–1 changing line(s).
- You MUST include one short direct quote from the I Ching (hexagram text OR line text) in the body (15–40 Chinese characters is okay even in an English reading), and then explain it in plain English.

Tone & safety:
1) Warm, respectful, not overly fatalistic, but must sound profound and knowledgeable.
2) Include the I Ching quote in the main body and provide a clear plain-English explanation of what it implies.
3) End with: "Disclaimer: For entertainment only and not a substitute for professional advice."

### User
[Personal Info]
- Date of birth: ${dob}
- Time of birth: ${time}
- Place of birth: ${city}
- Gender: ${gender}

[What I want guidance on]
${topic}

### Assistant - Expected format
**1) Core takeaway (≤ 30 words)**

**2) Bazi overview**
- Pillars (Heavenly Stems & Earthly Branches): ...
- Five elements balance: ...
- Favorable elements / unfavorable elements: ...
> *Quote requirement*: If you mention "useful element" judgments, include one short quote from a classic (can be in Chinese) and explain it in English.

**3) Reading for "${topic}"**
- Short-term (today/this week):
- Medium-term (next 1–3 months):
- Practical suggestions (3 bullets max):

**4) I Ching draw**
- Hexagram name/number: ...
- Quote (15–40 chars): "..."
- Plain-English meaning:
- If there is a changing line, specify which line and why it matters.

**5) Closing**
Disclaimer: For entertainment only and not a substitute for professional advice.
`;


            const resp = await fetch("https://hf-api-tau.vercel.app/api/fortune", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "Qwen/Qwen3-8B:featherless-ai",
                    messages: [
                        { role: "user", content: fullPrompt }
                    ],
                    chat_template_kwargs: { enable_thinking: false }
                })
            });


            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error(errText || 'request failed');
            }

            const data = await resp.json();
            return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || JSON.stringify(data);
        }


        function App() {
            const [dob, setDob] = React.useState('');
            const [time, setTime] = React.useState('');
            const [city, setCity] = React.useState('');
            const [model, setModel] = React.useState('gpt4o');
            const [result, setResult] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);
            const [gender, setGender] = React.useState('female');
            const [topic, setTopic] = React.useState('');

            async function handleSubmit(e) {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const content = await fetchFortuneViaHuggingFaceProxy({
                        dob: dob || "2000-01-01",
                        time: time || "12:00",
                        city: city || "Beijing Children's Hospital",
                        gender: gender || "female",
                        topic: topic || "What are my chances to move on with today's interview..."
                    });

                    // Save to state
                    setResult(content);

                    // Put content in result-content div
                    const resultContent = document.getElementById('result-content');
                    if (resultContent) {
                        resultContent.innerText = content;
                    }

                    // Show result box
                    const resultBox = document.getElementById('result-box');
                    if (resultBox) {
                        resultBox.style.display = 'block';
                    }

                    // Show down arrow
                    const arrow = document.querySelector('.scroll-down-arrow');
                    if (arrow) {
                        arrow.style.display = 'flex';
                    }

                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }



            const inputStyle = {
                width: '100%',
                padding: '0.5em',
                fontSize: '1em',
                border: '1px solid #ccc',
                borderRadius: '4px',
                boxSizing: 'border-box',
                appearance: 'none',
                WebkitAppearance: 'none',
                MozAppearance: 'none',
                backgroundColor: 'white',
                height: '2.5em',
                lineHeight: '2.5em'
            };

            return (
                <div style={{
                    width: '100%',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    marginLeft: '2em',  // same as form's right margin
                    marginRight: '2em'  // same as form's right margin
                }}>
                    <div style={{ marginBottom: '1em' }}>
                        <h1 style={{ fontSize: '3em', margin: 0 }}>{getGreetingAndDate()}</h1>
                    </div>
                    <div style={{ marginBottom: '2.5em' }}>
                        <h1>What's on your mind today? 👋</h1>
                    </div>

                    <form onSubmit={handleSubmit} style={{
                        width: '100%',
                        background: 'white',
                        padding: '1.5em',
                        borderRadius: '8px',
                        boxShadow: '0 0 8px rgba(0,0,0,0.1)',
                        boxSizing: 'border-box',
                    }}>
                        <div style={{ display: 'flex', gap: '1em' }}>
                            <div style={{ flex: 1 }}>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>Date of Birth：</label>
                                    <input type="date" value={dob} onChange={e => setDob(e.target.value)} required style={inputStyle} />
                                </div>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>Time of birth：</label>
                                    <input type="time" value={time} onChange={e => setTime(e.target.value)} required style={inputStyle} />
                                </div>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>Place of birth: </label>
                                    <input type="text" value={city} onChange={e => setCity(e.target.value)} placeholder="Beijing Children's Hospital" style={inputStyle} />
                                </div>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>Model: </label>
                                    <select
                                        value={model}
                                        onChange={e => setModel(e.target.value)}
                                        style={{
                                            width: '100%',
                                            padding: '0.5em',
                                            fontSize: '1em',
                                            border: '1px solid #ccc',
                                            borderRadius: '4px',
                                            boxSizing: 'border-box',
                                            appearance: 'none',
                                            WebkitAppearance: 'none',
                                            MozAppearance: 'none',
                                            lineHeight: '1.5em',
                                            height: '2.5em',
                                            backgroundColor: 'white',
                                            backgroundImage: "url(\"data:image/svg+xml;utf8,<svg fill='gray' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>\")",
                                            backgroundRepeat: 'no-repeat',
                                            backgroundPosition: 'right 0.5em center',
                                            backgroundSize: '1em'
                                        }}
                                    >
                                        <option value="qwen3"> Qwen3‑8B</option>
                                    </select>

                                </div>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>Gender: </label>
                                    <select
                                        value={gender}
                                        onChange={e => setGender(e.target.value)}
                                        style={{
                                            width: '100%',
                                            padding: '0.5em',
                                            fontSize: '1em',
                                            border: '1px solid #ccc',
                                            borderRadius: '4px',
                                            boxSizing: 'border-box',
                                            appearance: 'none',
                                            WebkitAppearance: 'none',
                                            MozAppearance: 'none',
                                            lineHeight: '1.5em',
                                            height: '2.5em',
                                            backgroundColor: 'white',
                                            backgroundImage: "url(\"data:image/svg+xml;utf8,<svg fill='gray' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>\")",
                                            backgroundRepeat: 'no-repeat',
                                            backgroundPosition: 'right 0.5em center',
                                            backgroundSize: '1em'
                                        }}
                                    >
                                        <option value="female">Female</option>
                                        <option value="male">Male</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </div>

                            <div style={{ flex: 1 }}>
                                <div style={{ marginBottom: '1em' }}>
                                    <label>What's on your mind:</label>
                                    <input
                                        type="text"
                                        value={topic}
                                        onChange={e => setTopic(e.target.value)}
                                        placeholder="How will my intervivew go..."
                                        style={{
                                            ...inputStyle,
                                            height: '20em',
                                            resize: 'none'
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                        <button type="submit" style={{
                            background: '#4f46e5',
                            color: 'white',
                            border: 'none',
                            fontWeight: 'bold',
                            cursor: 'pointer',
                            textAlign: 'center',
                            lineHeight: '2.5em',
                            height: '2.5em',
                            borderRadius: '6px',
                            width: '100%',
                            display: 'block'
                        }}>
                            {loading ? 'Calculating…' : "Get today's reading"}
                        </button>

                        {error && <p style={{ color: 'red' }}>{error}</p>}

                        <div
                            className="scroll-down-arrow"
                            onClick={() => {
                                const box = document.getElementById('result-box');
                                if (box) {
                                    box.scrollIntoView({ behavior: 'smooth' });
                                }
                            }}
                        >
                            ↓Scroll for results
                        </div>
                    </form>


                </div>
            );

        }

        ReactDOM.createRoot(document.getElementById('root')).render(
            <React.Fragment>
                <App />
            </React.Fragment>
        );

    </script>
</body>

</html>
